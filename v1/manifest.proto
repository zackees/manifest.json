// Canonical schema for the unified manifest.json format.
//
// See DESIGN.md for rationale and the full schema reference. JSON is the
// wire format; this proto file is the source of truth for field numbers,
// types, and forward-compat rules.
//
// JSON projection conventions (DESIGN.md §3.5):
//   - field names are snake_case (no implicit camelCase)
//   - enums project to lowercase strings
//   - fields equal to their proto3 default value MAY be omitted

syntax = "proto3";

package manifest.v1;

// ---------------------------------------------------------------------------
// Shared primitives
// ---------------------------------------------------------------------------

// Orthogonal platform tuple. Two Platform values are equal iff every field
// present in BOTH has the same value. A field present in only one acts as a
// wildcard during resolution (see DESIGN.md §5.3).
message Platform {
  string os                = 1; // linux | darwin | windows | freebsd | wasi | ...
  string arch              = 2; // x86_64 | aarch64 | armv7 | riscv64 | wasm32 | ...
  string os_version        = 3; // minimum OS version (e.g. "11.0")
  string libc              = 4; // glibc | musl | msvc | mingw
  string abi               = 5; // gnu | gnullvm | eabihf
  repeated string features = 6; // CPU feature tags: avx2, neon, sve, ...
}

// Orthogonal variant axis. Same wildcard semantics as Platform.
message Variant {
  string optimization = 1; // pgo+lto | size | debug | ...
  string edition      = 2; // full | minimal | install_only | install_only_stripped
  string flavor       = 3; // distribution-defined free-form tag
}

// Content-addressed reference to another document or binary blob.
message Descriptor {
  string url        = 1;
  string sha256     = 2; // lowercase hex
  uint64 size_bytes = 3;
  string media_type = 4; // optional; e.g. "application/vnd.manifest.v1+json"
}

// A single downloadable artifact.
message Asset {
  string filename            = 1;
  string media_type          = 2;
  uint64 size_bytes          = 3;
  string sha256              = 4;
  repeated string urls       = 5; // primary first, then mirrors
  repeated Part parts        = 6; // empty unless multi-part
  repeated Signature signatures = 7;
  string sbom_url            = 8;
  string provenance_url      = 9;
  bool   yanked              = 10;
  string yanked_reason       = 11;

  // Entry-point binaries this archive provides (e.g. ["clang-tidy",
  // "clang-format", "iwyu"]). Flat-string summary; cheap to keep inline.
  // Lets consumers grep "does archive X ship tool Y?" without fetching
  // the archive or the full ArchiveContents document.
  repeated string provides = 12;

  // Optional pointer to a separate ArchiveContents document listing
  // every file inside the archive. Heavy (often hundreds of entries) —
  // lives in its own file so it doesn't bloat Catalogs or embedded
  // slices. Verifiable via Descriptor.sha256.
  Descriptor contents_manifest = 13;
}

// One chunk of a multi-part archive.
message Part {
  uint32 number          = 1; // 1-indexed
  string sha256          = 2;
  uint64 size_bytes      = 3;
  repeated string urls   = 4;
}

// Pointer to a detached signature.
message Signature {
  string type     = 1; // cosign | minisign | gpg | ssh
  string url      = 2;
  string key_hint = 3;
}

// ---------------------------------------------------------------------------
// Tier 1 — Index (federated top-level)
// ---------------------------------------------------------------------------

message Index {
  string kind                  = 1; // "Index"
  uint32 schema_version        = 2; // currently 1
  map<string, ToolEntry> tools = 3;
  // Optional pointer to the canonical JSON Schema this document conforms
  // to. Recommended value: a versioned URL (e.g.
  // "https://zackees.github.io/manifest.json/v1/manifest.schema.json").
  // Lets IDEs auto-validate and lets `jsonschema` self-resolve. Wire
  // identifier `schema`; JSON projection `$schema` (conventional).
  string schema                = 4 [json_name = "$schema"];
}

message ToolEntry {
  Descriptor descriptor = 1; // points at the per-tool Catalog
  string     summary    = 2; // optional one-line description
}

// ---------------------------------------------------------------------------
// Tier 2 — Catalog (per tool)
// ---------------------------------------------------------------------------

message Catalog {
  string kind                    = 1; // "Catalog"
  uint32 schema_version          = 2;
  string tool                    = 3;
  string online_url              = 4; // self-pointer (canonical URL of this doc)
  map<string, string> channels   = 5; // channel name -> version
  repeated Release releases      = 6; // sorted newest-first
  string schema                  = 7 [json_name = "$schema"]; // see Index.schema
}

// ---------------------------------------------------------------------------
// Tier 3 — Release (per (tool, version))
//
// May appear standalone as the document attached to a GitHub Release, or
// embedded inside a Catalog as one element of `releases[]`.
// ---------------------------------------------------------------------------

message Release {
  string kind                        = 1; // "Release" when standalone; "" inside a Catalog
  uint32 schema_version              = 2;
  string tool                        = 3;
  string version                     = 4;
  string published_at                = 5; // RFC 3339
  string urgency                     = 6; // low | medium | high | critical
  uint32 min_client_version          = 7; // gates older embedded readers
  repeated ReleasePlatform platforms = 8;
  repeated Component components      = 9;
  Source source                      = 10; // canonical source; fallback when no binary matches
  string schema                      = 11 [json_name = "$schema"]; // see Index.schema
}

// Canonical source location for a Release. Optional sibling of `platforms[]`.
// When set, callers that fail to find a matching binary can fall back to
// building from source. This is NOT a build recipe — `build_command` is
// just a hint pointer.
message Source {
  // VCS-tracked source.
  string vcs                = 1; // "git" | "hg" | "svn" | ""
  string repo_url           = 2; // e.g. "https://github.com/zackees/soldr"
  string ref                = 3; // git tag / commit (e.g. "v1.4.2")

  // Pre-packaged archive (e.g. GitHub's auto-generated v1.4.2.tar.gz).
  string archive_url        = 4;
  string archive_sha256     = 5;
  uint64 archive_size_bytes = 6;

  // Build hint — free-form. NOT a recipe; just a pointer.
  // e.g. "cargo build --release" or a path to BUILDING.md
  string build_command      = 7;

  // Optional: platforms this source is known to build for. Empty means
  // "no claim either way" — the caller tries and finds out.
  repeated Platform supported_platforms = 8;

  // Optional detached signatures over `archive_url`.
  repeated Signature signatures = 9;
}

message ReleasePlatform {
  Platform platform = 1;
  Variant  variant  = 2;
  Asset    asset    = 3;
}

message Component {
  string   id       = 1; // "clang-extra", "sysroot", "headers", ...
  bool     required = 2;
  Asset    asset    = 3;
  Platform platform = 4;
  Variant  variant  = 5;
}

// ---------------------------------------------------------------------------
// Tier 4 — EmbeddedSlice (compiled for one target)
// ---------------------------------------------------------------------------

message EmbeddedSlice {
  string      kind             = 1; // "EmbeddedSlice"
  uint32      schema_version   = 2;
  string      tool             = 3;
  CompiledFor compiled_for     = 4;
  string      compiled_version = 5;
  Asset       asset            = 6;
  string      signing_pubkey   = 7; // optional trust anchor for asset.signatures
  string      online_url       = 8; // back-link to canonical Catalog
  string      online_sha256    = 9; // sha of Catalog at compile time
  string      schema           = 10 [json_name = "$schema"]; // see Index.schema
}

message CompiledFor {
  Platform platform = 1;
  Variant  variant  = 2;
  string   channel  = 3; // the channel that resolved to compiled_version
}

// ---------------------------------------------------------------------------
// ArchiveContents (per archive)
//
// Optional companion document describing the file tree inside a single
// archive Asset. Modeled after the clang-tool-chain-bins sidecar `.tar.zst.json`
// pattern (file_count + files[]). Verifiable via `asset_sha256`.
// ---------------------------------------------------------------------------

message ArchiveContents {
  string   kind           = 1; // "ArchiveContents"
  uint32   schema_version = 2;
  string   asset_sha256   = 3; // back-link: must equal the Asset.sha256 this describes
  uint64   file_count     = 4;
  repeated ArchiveFile files = 5;
  string   schema         = 6 [json_name = "$schema"]; // see Index.schema
}

message ArchiveFile {
  string path     = 1; // forward-slashed, relative to archive root
  string type     = 2; // "file" | "dir" | "symlink" | "hardlink"
  uint64 size     = 3;
  uint32 mode     = 4; // POSIX permission bits
  string linkname = 5; // target for symlinks/hardlinks
  string sha256   = 6; // optional per-file content hash
}
